version: 1.0
runtime: nodejs22

build:
  commands:
    pre-build:
      - echo "Installing backend dependencies"
    build:
      - npm install
      - npm run build
    post-build:
      - echo "Backend build complete"

run:
  runtime-version: 22
  command: npm start
  network:
    port: 3001
    env: PORT
  env:
    # Set non-secret defaults here. ALL secrets (SUPABASE_*, JWT_SECRET, OPENAI_API_KEY,
    # STRIPE_*, SMTP_*, FRONTEND_URL, etc.) must be configured in the App Runner console
    # under "Environment variables" → "Secrets" so they are stored encrypted in Secrets
    # Manager and not committed to git.
    - name: NODE_ENV
      value: production
