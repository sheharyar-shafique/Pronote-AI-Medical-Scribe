# Bump nginx proxy timeouts so long-running OpenAI Whisper transcription and
# GPT note-generation requests aren't killed at the default 60-second
# proxy_read_timeout. 1800 seconds = 30 minutes, which matches the ALB
# IdleTimeout set in .ebextensions/01_alb_timeout.config so the two layers
# don't fight each other.
#
# client_max_body_size: must be raised from the 1MB default because the
# multer config in src/routes/audio.ts accepts audio uploads up to 100MB.
client_max_body_size 100M;
proxy_connect_timeout 1800s;
proxy_send_timeout    1800s;
proxy_read_timeout    1800s;
send_timeout          1800s;
